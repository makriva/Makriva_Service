services:
  postgres:
    image: postgres:15-alpine
    container_name: makriva_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: makriva_db
      POSTGRES_USER: makriva_user
      POSTGRES_PASSWORD: makriva_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makriva_user -d makriva_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: makriva_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://makriva_user:makriva_pass@postgres:5432/makriva_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: makriva_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: makriva_admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
